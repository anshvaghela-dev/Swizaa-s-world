<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0d0d0d"/>
  <!-- Decorative ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#c9a96e" stroke-width="0.8" opacity="0.4"/>
  <!-- Quill / feather pen -->
  <g transform="translate(16,16)">
    <!-- Feather body -->
    <path d="M0,-9 C5,-6 7,0 3,8 C1,5 -1,2 -2,-1 C-1,-3 0,-6 0,-9Z"
          fill="#c9a96e" opacity="0.9"/>
    <!-- Feather tip highlight -->
    <path d="M0,-9 C2,-7 3,-4 2,0 C1,-2 0,-5 0,-9Z"
          fill="#e8d5b0" opacity="0.6"/>
    <!-- Quill stem -->
    <line x1="0" y1="-2" x2="-3" y2="9"
          stroke="#c9a96e" stroke-width="1" stroke-linecap="round"/>
    <!-- Ink dot -->
    <circle cx="-3" cy="9" r="1.2" fill="#c9a96e"/>
  </g>
  <!-- Small star accent -->
  <text x="23" y="11" font-size="5" fill="#c9a96e" opacity="0.8" font-family="serif">✦</text>
</svg>
